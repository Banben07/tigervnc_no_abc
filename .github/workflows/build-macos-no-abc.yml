name: Build TigerVNC no-ABC for macOS

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apple-silicon:
    name: Build Apple Silicon
    runs-on: macos-15
    timeout-minutes: 45

    env:
      TARGET_ARCH: arm64
      ARTIFACT_NAME: TigerVNC-macOS-Apple-Silicon-no-ABC

    steps:
      - name: Check out patched fork
        uses: actions/checkout@v6

      - name: Initialize build paths
        run: |
          set -euxo pipefail
          printf 'FLTK_PREFIX=%s\n' \
            "$RUNNER_TEMP/fltk-patched" \
            >> "$GITHUB_ENV"

      - name: Verify no-ABC source patch
        run: |
          set -euxo pipefail

          grep -q \
            "TISCopyCurrentASCIICapableKeyboardLayoutInputSource" \
            vncviewer/KeyboardMacOS.mm

          if grep -q \
            "TISCopyCurrentKeyboardLayoutInputSource" \
            vncviewer/KeyboardMacOS.mm; then
            echo "The old keyboard-layout lookup is still present."
            exit 1
          fi

          echo "Building source revision:"
          git rev-parse HEAD

      - name: Install build dependencies
        run: |
          set -euxo pipefail

          brew install \
            cmake \
            pixman \
            ffmpeg \
            gnutls \
            nettle \
            gmp \
            googletest \
            gettext \
            jpeg-turbo \
            libpng \
            dylibbundler

      - name: Build patched FLTK 1.3
        run: |
          set -euxo pipefail

          FLTK_ARCHIVE="$RUNNER_TEMP/fltk-1.3.11-source.tar.bz2"
          FLTK_SOURCE="$RUNNER_TEMP/fltk-1.3.11"

          curl \
            --fail \
            --show-error \
            --silent \
            --location \
            "https://github.com/fltk/fltk/releases/download/release-1.3.11/fltk-1.3.11-source.tar.bz2" \
            --output "$FLTK_ARCHIVE"

          printf '%s  %s\n' \
            "ca2e144e5f89173cd094cc273940d56230b1bf613083a0792e6406dc191cd99f" \
            "$FLTK_ARCHIVE" |
            shasum -a 256 -c -

          tar \
            -xjf "$FLTK_ARCHIVE" \
            -C "$RUNNER_TEMP"

          python3 - <<'PY'
          import os
          import textwrap
          from pathlib import Path

          source_path = (
              Path(os.environ["RUNNER_TEMP"])
              / "fltk-1.3.11"
              / "src"
              / "Fl_cocoa.mm"
          )
          source = source_path.read_text(encoding="utf-8")

          declaration_marker = (
              "static TISCreateInputSourceList_type "
              "TISCreateInputSourceList;\n"
          )
          declaration_addition = (
              declaration_marker
              + "typedef CFTypeRef "
              "(*TISCopyCurrentASCIICapableKeyboardLayoutInputSource_type)"
              "(void);\n"
              + "static "
              "TISCopyCurrentASCIICapableKeyboardLayoutInputSource_type "
              "TISCopyCurrentASCIICapableKeyboardLayoutInputSource;\n"
          )

          loader_marker = (
              "      TISCreateInputSourceList = "
              "(TISCreateInputSourceList_type)"
              "Fl_X::get_carbon_function(\"TISCreateInputSourceList\");\n"
          )
          loader_addition = (
              loader_marker
              + "      "
              "TISCopyCurrentASCIICapableKeyboardLayoutInputSource = "
              "(TISCopyCurrentASCIICapableKeyboardLayoutInputSource_type)"
              "Fl_X::get_carbon_function("
              "\"TISCopyCurrentASCIICapableKeyboardLayoutInputSource\");\n"
          )

          declaration_count = source.count(declaration_marker)
          loader_count = source.count(loader_marker)
          if declaration_count != 1 or loader_count != 1:
              raise SystemExit(
                  "Expected one FLTK TIS declaration and loader; "
                  f"found declarations={declaration_count}, "
                  f"loaders={loader_count}."
              )

          source = source.replace(
              declaration_marker,
              declaration_addition,
              1,
          )
          source = source.replace(loader_marker, loader_addition, 1)

          start_marker = (
              "        inputSources = "
              "TISCreateInputSourceList(filter, false);\n"
          )
          end_marker = "        CFRelease(inputSources);\n"

          replacement = textwrap.indent(textwrap.dedent("""\
                inputSources = TISCreateInputSourceList(filter, false);
                CFRelease(filter);

                // A system with only an input method can have no enabled
                // keyboard-layout sources. Use the saved ASCII layout only
                // for this application's text input context in that case.
                if (inputSources == NULL) {
                  CFTypeRef asciiLayout = NULL;

                  if (TISCopyCurrentASCIICapableKeyboardLayoutInputSource !=
                      NULL) {
                    asciiLayout =
                      TISCopyCurrentASCIICapableKeyboardLayoutInputSource();
                  }
                  if (asciiLayout != NULL) {
                    const void *sources[] = { asciiLayout };
                    inputSources =
                      CFArrayCreate(NULL, sources, 1, &kCFTypeArrayCallBacks);
                    CFRelease(asciiLayout);
                  }
                }

                if (inputSources != NULL) {
                  TSMSetDocumentProperty(
                    doc, kTSMDocumentEnabledInputSourcesPropertyTag,
                    sizeof(CFArrayRef), &inputSources);
                  CFRelease(inputSources);
                }
          """), "        ")

          start_count = source.count(start_marker)
          end_count = source.count(end_marker)
          if start_count != 1 or end_count != 1:
              raise SystemExit(
                  "Expected exactly one FLTK input-source block; "
                  f"found starts={start_count}, ends={end_count}."
              )

          start = source.index(start_marker)
          end = source.index(end_marker, start) + len(end_marker)

          source_path.write_text(
              source[:start] + replacement + source[end:],
              encoding="utf-8",
          )

          print("Applied FLTK empty-keyboard-layout compatibility patch.")
          PY

          (
            cd "$FLTK_SOURCE"

            JPEG_PREFIX="$(brew --prefix jpeg-turbo)"
            PNG_PREFIX="$(brew --prefix libpng)"

            export MACOSX_DEPLOYMENT_TARGET=15.0
            export CPPFLAGS="\
          -I$JPEG_PREFIX/include \
          -I$PNG_PREFIX/include"
            export LDFLAGS="\
          -L$JPEG_PREFIX/lib \
          -L$PNG_PREFIX/lib"

            # FLTK's shared-library rule does not include LDFLAGS.
            # Clang also searches LIBRARY_PATH when resolving -lpng and
            # -ljpeg, so keep it exported for both configure and make.
            export LIBRARY_PATH="\
          $JPEG_PREFIX/lib:\
          $PNG_PREFIX/lib"

            ./configure \
              --prefix="$FLTK_PREFIX" \
              --enable-threads \
              --enable-shared

            make -j3
            make install
          )

          test -f "$FLTK_PREFIX/lib/libfltk.1.3.dylib"

          if otool -L "$FLTK_PREFIX/lib/libfltk.1.3.dylib" |
               grep -q '/opt/homebrew/opt/fltk@1.3'; then
            echo "The patched FLTK build unexpectedly uses Homebrew FLTK."
            exit 1
          fi

      - name: Configure TigerVNC
        run: |
          set -euxo pipefail

          CMAKE_PREFIXES="$(
            printf '%s;' \
              "$FLTK_PREFIX" \
              "$(brew --prefix pixman)" \
              "$(brew --prefix ffmpeg)" \
              "$(brew --prefix gnutls)" \
              "$(brew --prefix nettle)" \
              "$(brew --prefix gmp)" \
              "$(brew --prefix gettext)" \
              "$(brew --prefix jpeg-turbo)" \
              "$(brew --prefix googletest)"
          )"

          export PATH="$FLTK_PREFIX/bin:$PATH"

          cmake \
            -S . \
            -B build \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="$TARGET_ARCH" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIXES" \
            -DBUILD_VIEWER=ON \
            -DBUILD_JAVA=OFF \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_WAYLAND=OFF

      - name: Build TigerVNC DMG
        run: |
          set -euxo pipefail

          # The upstream DMG target copies compiled translations but does not
          # declare them as dependencies, so build the default target first.
          cmake --build build --parallel 3
          cmake --build build --target dmg --parallel 3

          BINARY="build/vncviewer/vncviewer"
          test -f "$BINARY"

          file "$BINARY"
          otool -L "$BINARY"

          if ! otool -L "$BINARY" |
               grep -Fq "$FLTK_PREFIX/lib/libfltk"; then
            echo "TigerVNC was not linked against the patched FLTK build."
            exit 1
          fi

          lipo -archs "$BINARY" |
            tr ' ' '\n' |
            grep -qx "$TARGET_ARCH"

      - name: Create portable signed DMG
        run: |
          set -euxo pipefail

          VERSION="$(
            sed -n \
              's/^set(VERSION \([^)]*\)).*/\1/p' \
              CMakeLists.txt |
            head -n 1
          )"

          ORIGINAL_DMG="$(
            find build/release \
              -maxdepth 1 \
              -name 'TigerVNC-*.dmg' \
              -print \
              -quit
          )"

          test -n "$VERSION"
          test -f "$ORIGINAL_DMG"

          OUTPUT_DIR="$GITHUB_WORKSPACE/output"
          MOUNT_DIR="$RUNNER_TEMP/tigervnc-dmg-mount"
          PACKAGE_DIR="$RUNNER_TEMP/tigervnc-package"

          mkdir -p "$OUTPUT_DIR" "$MOUNT_DIR" "$PACKAGE_DIR"

          hdiutil attach \
            "$ORIGINAL_DMG" \
            -mountpoint "$MOUNT_DIR" \
            -nobrowse \
            -readonly

          detach_image() {
            hdiutil detach "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap detach_image EXIT

          test -d "$MOUNT_DIR/TigerVNC.app"
          ditto \
            "$MOUNT_DIR/TigerVNC.app" \
            "$PACKAGE_DIR/TigerVNC.app"

          if [ -f "$MOUNT_DIR/LICENCE.TXT" ]; then
            ditto \
              "$MOUNT_DIR/LICENCE.TXT" \
              "$PACKAGE_DIR/LICENCE.TXT"
          fi

          if [ -f "$MOUNT_DIR/README.rst" ]; then
            ditto \
              "$MOUNT_DIR/README.rst" \
              "$PACKAGE_DIR/README.rst"
          fi

          hdiutil detach "$MOUNT_DIR"
          trap - EXIT

          APP="$PACKAGE_DIR/TigerVNC.app"
          EXECUTABLE="$APP/Contents/MacOS/vncviewer"
          LIBRARY_DIR="$APP/Contents/libs"

          test -f "$EXECUTABLE"

          HIGH_RESOLUTION_CAPABLE="$(
            plutil \
              -extract NSHighResolutionCapable \
              raw \
              -o - \
              "$APP/Contents/Info.plist"
          )"

          if [ "$HIGH_RESOLUTION_CAPABLE" != "true" ]; then
            echo "The packaged app is not marked as HiDPI capable."
            exit 1
          fi

          (
            cd "$PACKAGE_DIR"

            dylibbundler \
              --overwrite-dir \
              --bundle-deps \
              --fix-file \
              "TigerVNC.app/Contents/MacOS/vncviewer" \
              --dest-dir \
              "TigerVNC.app/Contents/libs" \
              --install-path \
              "@executable_path/../libs/"
          )

          if [ -d "$LIBRARY_DIR" ]; then
            while IFS= read -r -d '' library; do
              codesign \
                --force \
                --sign - \
                --timestamp=none \
                "$library"
            done < <(
              find "$LIBRARY_DIR" \
                -type f \
                -name '*.dylib' \
                -print0
            )
          fi

          codesign \
            --force \
            --sign - \
            --timestamp=none \
            "$EXECUTABLE"

          codesign \
            --force \
            --deep \
            --sign - \
            --timestamp=none \
            "$APP"

          codesign \
            --verify \
            --deep \
            --strict \
            --verbose=2 \
            "$APP"

          ARCHITECTURE_REPORT="$OUTPUT_DIR/architecture.txt"
          DEPENDENCY_REPORT="$OUTPUT_DIR/dependencies.txt"

          : > "$ARCHITECTURE_REPORT"
          : > "$DEPENDENCY_REPORT"

          check_binary() {
            binary="$1"

            echo "Binary: $binary" |
              tee -a "$ARCHITECTURE_REPORT"

            file "$binary" |
              tee -a "$ARCHITECTURE_REPORT"

            lipo -archs "$binary" |
              tee -a "$ARCHITECTURE_REPORT" |
              tr ' ' '\n' |
              grep -qx "$TARGET_ARCH"

            {
              echo "Binary: $binary"
              otool -L "$binary"
              otool -l "$binary"
              echo
            } >> "$DEPENDENCY_REPORT"
          }

          check_binary "$EXECUTABLE"

          if [ -d "$LIBRARY_DIR" ]; then
            while IFS= read -r -d '' library; do
              check_binary "$library"
            done < <(
              find "$LIBRARY_DIR" \
                -type f \
                -name '*.dylib' \
                -print0
            )
          fi

          if grep -E \
            '/opt/homebrew|/usr/local|/opt/local' \
            "$DEPENDENCY_REPORT"; then
            echo "A package-manager path remains in the app."
            exit 1
          fi

          set +e
          "$EXECUTABLE" -h \
            > "$OUTPUT_DIR/smoke-test.txt" \
            2>&1
          SMOKE_STATUS=$?
          set -e

          echo "Smoke-test exit status: $SMOKE_STATUS"

          if ! grep -q "TigerVNC" "$OUTPUT_DIR/smoke-test.txt"; then
            cat "$OUTPUT_DIR/smoke-test.txt"
            echo "TigerVNC did not produce the expected help output."
            exit 1
          fi

          FINAL_DMG="$OUTPUT_DIR/${ARTIFACT_NAME}-${VERSION}.dmg"

          hdiutil create \
            -fs HFS+ \
            -format UDZO \
            -volname "TigerVNC-${VERSION}-no-ABC" \
            -srcfolder "$PACKAGE_DIR" \
            "$FINAL_DMG"

          printf '%s\n' "$VERSION" \
            > "$OUTPUT_DIR/VERSION.txt"

          git rev-parse HEAD \
            > "$OUTPUT_DIR/source-revision.txt"

          grep -n \
            "TISCopyCurrent.*KeyboardLayoutInputSource" \
            vncviewer/KeyboardMacOS.mm \
            > "$OUTPUT_DIR/keyboard-layout-patch.txt"

          (
            cd "$OUTPUT_DIR"
            shasum -a 256 \
              "$(basename "$FINAL_DMG")" \
              > SHA256SUMS.txt
          )

          ls -lh "$OUTPUT_DIR"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: output/
          if-no-files-found: error
          retention-days: 14
